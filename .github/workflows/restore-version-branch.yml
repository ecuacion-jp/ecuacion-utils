name: Restore version branch after merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  restore:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check if source branch is a version branch
        id: check
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          if [[ "$branch" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "is_version_branch=true" >> $GITHUB_OUTPUT
            echo "branch=$branch" >> $GITHUB_OUTPUT
          else
            echo "is_version_branch=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore version branch
        if: steps.check.outputs.is_version_branch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/heads/${{ steps.check.outputs.branch }}`,
              sha: context.payload.pull_request.head.sha
            });
