name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ecuacion-utils

      - uses: actions/checkout@v5
        with:
          repository: ecuacion-jp/ecuacion-lib
          path: ecuacion-lib

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build ecuacion-lib
        working-directory: ecuacion-lib
        run: mvn install -DskipTests

      - name: Validate POM after version update
        working-directory: ecuacion-utils
        run: |
          mvn versions:set -DnewVersion=0.0.0-CI-TEST -DgenerateBackupPoms=false
          mvn versions:update-parent -DgenerateBackupPoms=false
          mvn versions:update-properties -Dincludes=jp.ecuacion.lib -DgenerateBackupPoms=false
          mvn validate
          git checkout -- .

      - name: Verify
        working-directory: ecuacion-utils
        run: mvn verify -Dwagon.skip=true -e

      - name: Upload coverage to Codecov
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main')
        # Third-party action pinned to a commit SHA (tags are mutable): v5
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ecuacion-utils/ecuacion-util-excel-table/target/site/jacoco/jacoco.xml,
            ecuacion-utils/ecuacion-util-excel-report-to-pdf/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
