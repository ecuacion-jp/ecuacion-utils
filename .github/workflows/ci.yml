name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

env:
  MAVEN_OPTS: -Xmx2g

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Verify
        run: mvn verify -Dwagon.skip=true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            ecuacion-util-poi/target/site/jacoco/jacoco.xml,
            ecuacion-util-pdfbox/target/site/jacoco/jacoco.xml
          fail_ci_if_error: false
