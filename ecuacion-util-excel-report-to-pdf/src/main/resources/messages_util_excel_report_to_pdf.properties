jp.ecuacion.util.pdf.excel.report.SheetNotExist.message.default=The excel file does not have specified sheet. (sheet name: {0})
jp.ecuacion.util.pdf.excel.report.SheetHasNoPrintArea.message.default=The sheet has no print area and no data. (sheet name: {0})
jp.ecuacion.util.pdf.excel.report.SystemFontNotFound.message.default=System font not found: {0}. Install the font, or register a fallback font via addRegularFontPath()/addFallbackFont() in PdfGenerateOptions.
